volumes:
  valkey-data:
  api-postgres-data:

services:
  api-postgres:
    container_name: api-postgres
    image: postgres:15.6
    restart: always
    environment:
      POSTGRES_USER: stroppy
      POSTGRES_PASSWORD: "${API_PG_PASSWORD:-stroppy}"
      POSTGRES_DB: stroppy_api
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - api-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d stroppy_api -U stroppy"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  api:
    container_name: api
    build:
      context: .
      dockerfile: deployments/docker/api.Dockerfile
      args:
        VERSION: "${VERSION}"
    restart: always
    network_mode: "host"
    depends_on:
      api-postgres:
        condition: service_healthy
    environment:
      PG_HOST: "localhost"
      PG_PORT: "5436"
      PG_USER: "stroppy"
      PG_PASSWORD: "${API_PG_PASSWORD:-stroppy}"
      PG_DATABASE: "stroppy_api"
      JWT_SECRET: "${JWT_SECRET:-stroppy-dev-secret-change-me}"
      HATCHET_CLIENT_TOKEN: "${HATCHET_CLIENT_TOKEN}"
      HATCHET_CLIENT_HOST_PORT: "${HATCHET_CLIENT_HOST_PORT:-localhost:7077}"
      HATCHET_CLIENT_TLS_STRATEGY: "none"
      API_ADDR: ":8090"
      LOG_MOD: "${LOG_MOD}"
      LOG_LEVEL: "${LOG_LEVEL}"

  master-worker:
    container_name: master-worker
    build:
      context: .
      dockerfile: deployments/docker/master-worker.Dockerfile
      args:
        VERSION: "${VERSION}"
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: "host"
    environment:
      K8S_CONFIG_PATH: "/k8s/config"
      VALKEY_URL: "redis://default:${VALKEY_PASSWORD}@localhost:6379"
      HATCHET_CLIENT_HOST_PORT: "${HATCHET_CLIENT_HOST_PORT:-localhost:7077}"
      HATCHET_CLIENT_TOKEN: "${HATCHET_CLIENT_TOKEN}"
      HATCHET_CLIENT_TLS_STRATEGY: "none"
      HATCHET_EDGE_WORKER_USER_NAME: "${HATCHET_EDGE_WORKER_USER_NAME}"
      HATCHET_EDGE_WORKER_SSH_KEY: "${HATCHET_EDGE_WORKER_SSH_KEY}"
      HATCHET_EDGE_WORKER_PUBLIC_IP: "${HATCHET_EDGE_WORKER_PUBLIC_IP}"
      YANDEX_SERIAL_PORT_ENABLE: "${YANDEX_SERIAL_PORT_ENABLE}"
      DOCKER_NETWORK_NAME: "${DOCKER_NETWORK_NAME:-stroppy-net}"
      EDGE_WORKER_DOCKER_IMAGE: "${EDGE_WORKER_DOCKER_IMAGE:-stroppy-edge-worker:latest}"
      LOG_MOD: "${LOG_MOD}"
      LOG_LEVEL: "${LOG_LEVEL}"
      LOG_SKIP_CALLER: "${LOG_SKIP_CALLER}"

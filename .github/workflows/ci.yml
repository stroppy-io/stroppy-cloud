name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - run: go build ./...
      - run: go test ./... -count=1 -race
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - uses: golangci/golangci-lint-action@v6
        with: { version: latest }

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - run: docker pull ubuntu:22.04
      - run: CGO_ENABLED=0 go build -o /tmp/stroppy-cloud ./cmd/cli/
      - run: go test -tags=integration -timeout 30m -v ./tests/ -run TestE2E_Postgres_Single_TPCB
        env:
          STROPPY_BINARY_HOST_PATH: /tmp/stroppy-cloud

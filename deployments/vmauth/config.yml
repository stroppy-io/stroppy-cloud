# vmauth config — single entry point for VictoriaMetrics cluster + VictoriaLogs.
# Requires bearer token. Use %{ENV_VAR} for env substitution.

users:
  - bearer_token: "%{VMAUTH_TOKEN}"
    url_map:
      # VictoriaLogs: write (uses AccountID header, not path prefix)
      - src_paths:
          - "/insert/jsonline"
        url_prefix: "http://victorialogs:9428/"
      # VictoriaLogs: read (uses AccountID header, not path prefix)
      - src_paths:
          - "/select/logsql/.+"
        url_prefix: "http://victorialogs:9428/"
      # VictoriaMetrics cluster: write (vminsert, path prefix /insert/<accountID>/...)
      - src_paths:
          - "/insert/.+"
        url_prefix: "http://vminsert:8480/"
      # VictoriaMetrics cluster: read (vmselect, path prefix /select/<accountID>/...)
      - src_paths:
          - "/select/.+"
        url_prefix: "http://vmselect:8481/"

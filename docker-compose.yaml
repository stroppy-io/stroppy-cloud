services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: stroppy
      POSTGRES_USER: stroppy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stroppy}
    ports:
      - "${BIND_ADDR:-0.0.0.0}:5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U stroppy" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- VictoriaMetrics cluster (multi-tenant metrics) ---
  vmstorage:
    image: victoriametrics/vmstorage:v1.139.0-cluster
    restart: always
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=30d"
    volumes:
      - vmdata:/storage

  vminsert:
    image: victoriametrics/vminsert:v1.139.0-cluster
    restart: always
    command:
      - "-storageNode=vmstorage:8400"
    depends_on:
      - vmstorage

  vmselect:
    image: victoriametrics/vmselect:v1.139.0-cluster
    restart: always
    command:
      - "-storageNode=vmstorage:8401"
    depends_on:
      - vmstorage

  # --- VictoriaLogs (multi-tenant logs) ---
  victorialogs:
    image: victoriametrics/victoria-logs:v1.48.0
    restart: always
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=30d"
    volumes:
      - vldata:/storage

  # --- vmauth (single entry point for all monitoring) ---
  vmauth:
    image: victoriametrics/vmauth:v1.139.0
    restart: always
    command:
      - "-auth.config=/etc/vmauth/config.yml"
    ports:
      - "8427:8427"
    environment:
      VMAUTH_TOKEN: ${MONITORING_TOKEN:-stroppy-monitoring-secret}
    volumes:
      - ./deployments/vmauth/config.yml:/etc/vmauth/config.yml:ro
    depends_on:
      - vminsert
      - vmselect
      - victorialogs

  grafana:
    image: grafana/grafana:12.4.2
    restart: always
    ports:
      - "${BIND_ADDR:-0.0.0.0}:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: ${GF_ANON_ENABLED:-true}
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL:-http://localhost:3001}
      GF_SERVER_SERVE_FROM_SUB_PATH: ${GF_SERVE_SUB_PATH:-false}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployments/grafana/dashboards:/var/lib/grafana/dashboards:ro

  # --- Stroppy Cloud server ---
  # Runs with host networking so it can reach Docker agent containers directly.
  server:
    restart: always
    build:
      context: .
      dockerfile: deployments/docker/stroppy-cloud.Dockerfile
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      vmauth:
        condition: service_started
    command:
      - serve
      - --addr=:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: postgres://stroppy:${POSTGRES_PASSWORD:-stroppy}@127.0.0.1:5436/stroppy?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-stroppy-dev-secret}
      MONITORING_URL: http://127.0.0.1:8427
      MONITORING_TOKEN: ${MONITORING_TOKEN:-stroppy-monitoring-secret}
      GRAFANA_URL: ${GRAFANA_URL:-http://127.0.0.1:3001}
      STROPPY_ADMIN_PASSWORD: ${STROPPY_ADMIN_PASSWORD:-}
      YC_TOKEN: ${YC_TOKEN:-}
      YC_CLOUD_ID: ${YC_CLOUD_ID:-}
      YC_FOLDER_ID: ${YC_FOLDER_ID:-}

  # --- Caddy reverse proxy (prod only) ---
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: [prod]
    network_mode: host
    volumes:
      - ./deployments/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  vmdata:
  vldata:
  grafanadata:
  caddy_data:
  caddy_config:

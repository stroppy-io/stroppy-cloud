lint:
  use:
    - DEFAULT
  enum_zero_value_suffix: _NONE
  service_suffix: API
  ignore: []
  except: []
  allow_comment_ignores: false
  ignore_only: {}
deps:
  - github.com/bufbuild/protoc-gen-validate@v1.2.1
  - github.com/stroppy-io/stroppy@v3.0.0
  - github.com/yaroher/protoc-gen-go-plain@v0.7.13
  - github.com/yaroher/ratel@v0.4.1
generate:
  inputs:
    - directory: edge
    - directory: stroppy
    - directory: database
    - directory: settings
    - directory: deployment
    - directory: workflows
    - directory: provision
    - directory: api
    - directory: models
    - git_repo:
        url: github.com/bufbuild/protoc-gen-validate
        sub_directory: validate
    - git_repo:
        url: github.com/yaroher/protoc-gen-go-plain
        sub_directory: goplain
    - git_repo:
        url: github.com/yaroher/ratel
        sub_directory: ratelproto
  plugins:
    - name: go
      out: ../../internal/proto
      opts:
        paths: source_relative
    - name: go-grpc
      out: ../../internal/proto
      opts:
        paths: source_relative
    - name: connect-go
      out: ../../internal/proto
      opts:
        paths: source_relative
    - name: validate
      out: ../../internal/proto
      opts:
        lang: go
        paths: source_relative
    - name: go-json
      out: ../../internal/proto
      opts:
        paths: source_relative
    - name: go-plain
      out: ../../internal/proto
      opts:
        paths: source_relative
    - name: ratel
      out: ../../internal/proto
      opts:
        paths: source_relative
    - name: es
      out: ../../web/src/proto
      opts:
        target: ts
        import_extension: ts
        json_types: true
        valid_types: legacy_required+protovalidate_required
    - name: connect-es
      out: ../../web/src/proto
      opts:
        target: ts
        import_extension: ts
breaking:
  ignore: []
  against_git_ref: master-worker

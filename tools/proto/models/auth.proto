syntax = "proto3";

package models;

option go_package = "github.com/stroppy-io/hatchet-workflow/internal/proto/models";

import "ratelproto/ratelproto.proto";
import "goplain/goplain.proto";
import "google/protobuf/timestamp.proto";

// ============================================================================
// Auth Users
// ============================================================================

message UserRecord {
  option (ratel.table) = {
    generate: true
    table_name: "users"
    schema: "auth"
    indexes: [
      {
        name: "auth_users_username_idx"
        columns: ["username"]
        unique: true
      }
    ]
  };
  option (goplain.message).generate = true;

  string id = 1 [(ratel.column) = {
    constraints: {
      primary_key: true
      check: "id <> ''"
    }
  }];

  string username = 2;

  string encrypted_password = 3 [(ratel.column).constraints = {
    default_value: "''"
  }];

  string role = 4 [(ratel.column).constraints = {
    default_value: "'user'"
  }];

  google.protobuf.Timestamp created_at = 5 [(ratel.column).constraints = {
    default_value: "now()"
  }];

  google.protobuf.Timestamp updated_at = 6 [(ratel.column).constraints = {
    default_value: "now()"
  }];
}

// ============================================================================
// Auth Sessions
// ============================================================================

message SessionRecord {
  option (ratel.table) = {
    generate: true
    table_name: "sessions"
    schema: "auth"
    indexes: [
      {
        name: "auth_sessions_user_id_idx"
        columns: ["user_id"]
      }
    ]
  };
  option (goplain.message).generate = true;

  string id = 1 [(ratel.column) = {
    constraints: {
      primary_key: true
      check: "id <> ''"
    }
  }];

  string user_id = 2 [(ratel.column).constraints = {
    references_schema: "auth"
    references_table: "users"
    references_column: "id"
    on_delete: CASCADE
  }];

  google.protobuf.Timestamp created_at = 3 [(ratel.column).constraints = {
    default_value: "now()"
  }];

  google.protobuf.Timestamp expires_at = 4;
}

// ============================================================================
// Auth Refresh Tokens
// ============================================================================

message RefreshTokenRecord {
  option (ratel.table) = {
    generate: true
    table_name: "refresh_tokens"
    schema: "auth"
    indexes: [
      {
        name: "auth_refresh_tokens_token_hash_idx"
        columns: ["token_hash"]
        unique: true
      },
      {
        name: "auth_refresh_tokens_session_id_idx"
        columns: ["session_id"]
      }
    ]
  };
  option (goplain.message).generate = true;

  string id = 1 [(ratel.column) = {
    constraints: {
      primary_key: true
      check: "id <> ''"
    }
  }];

  string session_id = 2 [(ratel.column).constraints = {
    references_schema: "auth"
    references_table: "sessions"
    references_column: "id"
    on_delete: CASCADE
  }];

  string token_hash = 3;

  bool revoked = 4 [(ratel.column).constraints = {
    default_value: "false"
  }];

  google.protobuf.Timestamp created_at = 5 [(ratel.column).constraints = {
    default_value: "now()"
  }];
}
